<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tapin Favicon - Hand Tap Icon -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#iconGradient)" filter="url(#shadow)"/>

  <!-- Hand Icon in White -->
  <g transform="translate(20, 16)">
    <!-- Palm/Hand -->
    <path d="M 6 18 Q 3 16 3 12 L 3 8 Q 3 5 6 5 Q 9 5 9 8 L 9 10 L 11 10 L 11 6 Q 11 3 14 3 Q 17 3 17 6 L 17 11 L 19 11 L 19 7 Q 19 4 22 4 Q 25 4 25 7 L 25 14 Q 25 18 22 21 L 12 21 Q 6 21 6 18 Z"
          fill="white"
          opacity="0.95"/>
    <!-- Finger pointing down -->
    <path d="M 13 21 L 13 26 Q 13 28 15 28 Q 17 28 17 26 L 17 21"
          fill="white"
          opacity="0.95"/>
    <!-- Touch ripple -->
    <circle cx="15" cy="30" r="2" fill="none" stroke="white" stroke-width="1.2" opacity="0.6"/>
    <circle cx="15" cy="30" r="3.5" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
  </g>
</svg>
