<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Tapin Logo - Modern Design with Hand Tap Icon -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hand Tap Icon - Left Side -->
  <g transform="translate(8, 12)">
    <!-- Palm/Hand -->
    <path d="M 12 28 Q 8 24 8 18 L 8 12 Q 8 8 12 8 Q 16 8 16 12 L 16 16 L 18 16 L 18 10 Q 18 6 22 6 Q 26 6 26 10 L 26 18 L 28 18 L 28 12 Q 28 8 32 8 Q 36 8 36 12 L 36 22 Q 36 28 32 32 L 18 32 Q 12 32 12 28 Z"
          fill="url(#logoGradient)"
          opacity="0.9"/>
    <!-- Finger pointing down (tap gesture) -->
    <path d="M 20 32 L 20 38 Q 20 40 22 40 Q 24 40 24 38 L 24 32"
          fill="url(#logoGradient)"/>
    <!-- Touch ripple effect -->
    <circle cx="22" cy="42" r="3" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
    <circle cx="22" cy="42" r="5" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Brand Text "Tapin" -->
  <text x="60" y="38" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="700" fill="#1e293b" letter-spacing="-0.5">
    Tap<tspan fill="url(#logoGradient)">in</tspan>
  </text>

  <!-- Tagline -->
  <text x="61" y="50" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="500" fill="#64748b" letter-spacing="0.5">
    VOLUNTEER CONNECT
  </text>
</svg>
